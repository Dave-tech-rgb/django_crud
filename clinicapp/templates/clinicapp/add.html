{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Add Appointment</title>
    <link rel="stylesheet" href="{% static 'clinicapp/style.css' %}">
</head>
<body>

<div class="container">
    <h2>Add Appointment</h2>

    <form method="POST">
    {% csrf_token %}

    <h4>Select Existing</h4>

    <label>Patient:</label><br>
    <select name="patient">
        <option value="">-- Select Patient --</option>
        {% for p in patients %}
            <option value="{{ p.id }}">{{ p.name }}</option>
        {% endfor %}
    </select><br><br>

    <label>Doctor:</label><br>
    <select name="doctor">
        <option value="">-- Select Doctor --</option>
        {% for d in doctors %}
            <option value="{{ d.id }}">{{ d.name }}</option>
        {% endfor %}
    </select><br><br>

    <hr>

    <h4>Or Add Manually</h4>

    <label>New Patient Name:</label><br>
    <input type="text" name="new_patient"><br><br>

    <label>Patient Information</label><br>
    <input type="number" name="new_patient_age" placeholder="Patient Age">

    <label>New Doctor Name:</label><br>
    <input type="text" name="new_doctor"><br><br>

    <label>Date:</label><br>
    <input type="date" name="date" required><br><br>

    <label>Time:</label><br>
    <input type="time" name="time" required><br><br>
 
    <button type="submit" class="btn">Save</button>
    <a href="/" class="btn">Back</a>
</form>
</div>

</body>
</html>
