{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Appointments</title>
    <link rel="stylesheet" href="{% static 'clinicapp/style.css' %}">
</head>
<body>

<div class="container">
    <h2>Appointments</h2>

    <a href="{% url 'add_appointment' %}" class="btn">+ Add Appointment</a>

    <table>
        <thead>
            <tr>
                <th>Patient</th>
                <th>Doctor</th>
                <th>Date</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
        {% for a in appointments %}
            <tr>
                <td>{{ a.patient.name }}</td>
                <td>{{ a.doctor.name }}</td>
                <td>{{ a.date }}</td>
                <td>{{ a.time }}</td>
                <td>
                    <a href="{% url 'edit_appointment' a.id %}">Edit</a> |
                    <a href="{% url 'delete_appointment' a.id %}">Delete</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="5" class="empty">No appointments found.</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
